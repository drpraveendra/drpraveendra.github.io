title: Dr. Praveendra Singh
description: Assistant Professor of Mathematics
url: "https://drpraveendra.github.io"
theme: minima

# Author Details
author: Dr. Praveendra Singh
email: drpraveendra.singh@gmail.com

# Social Links (Minima v2 style)
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/drpraveendra" }
    - { platform: youtube, user_url: "https://www.youtube.com/@FractalFrontierMaths" }

markdown: kramdown
kramdown:
  math_engine: mathjax

sass:
  style: compressed

plugins:
  - jekyll-sitemap

header_pages:
  - about.md
  - research.md
  - publications.md
  - resources.md
  - videos.md
  - recommended-books.md
  - blog.md
  - contact.md

future: false
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "maths"
