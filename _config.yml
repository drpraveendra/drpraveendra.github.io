title: "Dr. Praveendra Singh | Mathematics Professor & Educator"
tagline: "IIT Roorkee PhD | Fractal Frontier Maths | Free Maths in Hindi"
description: >
  Dr. Praveendra Singh – Assistant Professor of Mathematics at Government College
  Kherwara, Udaipur. PhD from IIT Roorkee. Free mathematics lectures in Hindi for
  BSc, MSc, CSIR NET, GATE and IIT JAM aspirants. Research in inventory control,
  supply chain optimisation and metaheuristic algorithms.
url: "https://drpraveendra.github.io"
theme: minima
lang: en
timezone: Asia/Kolkata

# Author Details
author: Dr. Praveendra Singh
email: drpraveendra.singh@gmail.com

# Social Links (Minima v2 style)
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/drpraveendra" }
    - { platform: youtube, user_url: "https://www.youtube.com/@FractalFrontierMaths" }

markdown: kramdown
kramdown:
  math_engine: mathjax

sass:
  style: compressed

plugins:
  - jekyll-sitemap

header_pages:
  - about.md
  - research.md
  - publications.md
  - resources.md
  - videos.md
  - recommended-books.md
  - blog.md
  - contact.md

future: false
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "maths"
