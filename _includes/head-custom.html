<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
document.addEventListener("DOMContentLoaded", function(){

const tooltips = {
"about":"About the author",
"research":"Research interests and work",
"publications":"Journal articles and research papers",
"teaching":"Courses and lecture materials",
"resources":"Free mathematics learning resources",
"recommended books":"Topic-wise recommended books",
"lecture videos":"Mathematics lecture videos",
"research projects":"Current and past research projects",
"contact":"Get in touch"
};

document.querySelectorAll(".site-nav a").forEach(link => {

let text = link.textContent.replace(/\s+/g,' ').trim().toLowerCase();

if(tooltips[text]){
link.setAttribute("data-tooltip", tooltips[text]);
}

});

});
</script>
