<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
document.addEventListener("DOMContentLoaded", function(){

const tooltips = {
"About":"About the author",
"Research":"Research interests and work",
"Publications":"Journal articles and papers",
"Teaching":"Courses and lecture materials",
"Resources":"Free mathematics resources",
"Recommended Books":"Topic-wise book recommendations",
"Lecture Videos":"Mathematics video lectures",
"Research Projects":"Current and past research projects",
"Contact":"Get in touch"
};

document.querySelectorAll(".site-nav a").forEach(link => {

const text = link.textContent.trim();

if(tooltips[text]){
link.setAttribute("data-tooltip", tooltips[text]);
}

});

});
</script>
